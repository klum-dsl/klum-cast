name: CI

on:
  push:
    branches: [ main, master, release-* ]
  pull_request:
    branches: [ main, master, release-* ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  groovy-tests:
    name: Java 17 / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Groovy 3
            task: test
          - name: Groovy 4
            task: groovy4Tests
          - name: Groovy 5
            task: groovy5Tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Run ${{ matrix.name }} tests
        run: ./gradlew ${{ matrix.task }}
      - name: Publish ${{ matrix.name }} JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.task }}
          path: '**/build/test-results/${{ matrix.task }}/**/*.xml'
          if-no-files-found: error

  release-gate:
    name: Java 17 release evidence
    needs: groovy-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify matrix, publications, consumers, and JPMS boundaries
        run: ./gradlew check
      - name: Publish complete JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-release-gate
          path: '**/build/test-results/*/**/*.xml'
          if-no-files-found: error
