name: Verify public release coordinates

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact public X.Y.Z-rc.N or X.Y.Z version
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve:
    name: Gradle/Maven, Groovy 3–5, classpath/JPMS
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Resolve and execute exact public coordinates with clean caches
        env:
          PUBLIC_VERSION: ${{ inputs.version }}
        run: >-
          ./gradlew
          -PpublicVersion="$PUBLIC_VERSION"
          verifyPublicReleaseCoordinates
          --no-build-cache
          --no-daemon
      - name: Retain consumer evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-consumer-${{ inputs.version }}
          path: |
            build/public-consumer-markers/
            build/public-consumer-workspaces/**/build/klumcast-activation.txt
            build/public-consumer-workspaces/**/build/module-feasibility-groovy*/
          if-no-files-found: error
