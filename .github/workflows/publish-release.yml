name: Publish protected release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Public release channel
        required: true
        type: choice
        options:
          - rc
          - final
      version:
        description: Exact X.Y.Z-rc.N or X.Y.Z version
        required: true
        type: string
      commit:
        description: Full source commit SHA on main
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.channel == 'rc' && 'release-candidate' || 'final-release' }}
    env:
      KLUM_CAST_RELEASE_AUTHORIZED: ${{ inputs.channel }}
      ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
      ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
      ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.commit }}
      - name: Verify the authorized source commit
        env:
          EXPECTED_COMMIT: ${{ inputs.commit }}
        run: |
          actual_commit=$(git rev-parse HEAD)
          test "$actual_commit" = "$EXPECTED_COMMIT"
          git merge-base --is-ancestor "$actual_commit" origin/main
          test -z "$(git status --porcelain=v1)"
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify, sign, stage, and release the complete product
        env:
          RELEASE_CHANNEL: ${{ inputs.channel }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: >-
          ./gradlew
          -Prelease.channel="$RELEASE_CHANNEL"
          -Prelease.version="$RELEASE_VERSION"
          publishCompleteProductToCentral
          --no-build-cache
          --no-daemon
